<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zpix uploader</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  margin: 0;
  padding: 24px;
  background: #15171f;
  color: #e8e9ee;
  min-height: 100vh;
}
.wrap { max-width: 720px; margin: 0 auto; }
h1 { margin: 0 0 6px; font-size: 26px; }
.sub { color: #aeb3c4; margin: 0 0 22px; }
.drop {
  border: 2px dashed #353a4a;
  border-radius: 14px;
  padding: 28px 20px;
  text-align: center;
  background: #1a1d28;
  transition: border-color .15s, background .15s;
}
.drop.over { border-color: #6b7bff; background: #1d2438; }
.drop p { margin: 0 0 12px; color: #aeb3c4; }
.drop input[type=file] {
  display: block;
  margin: 8px auto 14px;
  font-size: 14px;
  color: #cfd3df;
}
.actions { margin-top: 14px; display: flex; gap: 12px; justify-content: center; }
.btn {
  padding: 12px 22px;
  background: #6b7bff;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.btn.ghost { background: #262a36; color: #cfd3df; }
.btn:disabled { opacity: .45; cursor: default; }

#summary {
  margin-top: 18px;
  background: #1a1d28;
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
}
#summary.on { display: block; }
#summary .head { display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; color: #cfd3df; }
#summary .head b { color: #fff; }
#summary .head .ok { color: #6bff8e; }
#summary .head .bad { color: #ff6b6b; }
#summary .head .dim { color: #6f7a93; }
#summary .bar { height: 8px; background: #2a2e3a; border-radius: 4px; overflow: hidden; margin-top: 10px; }
#summary .bar > div { height: 100%; background: #6b7bff; width: 0; transition: width .25s; }
#summary .current { margin-top: 10px; font-size: 13px; color: #aeb3c4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#summary .current b { color: #e8e9ee; }
#summary .toggle { margin-top: 8px; font-size: 13px; color: #8ea2ff; cursor: pointer; user-select: none; }

#storage {
  margin: 0 0 18px;
  padding: 10px 14px;
  background: #1a1d28;
  border-radius: 10px;
  font-size: 13px;
  color: #aeb3c4;
}
#storage b { color: #fff; }
#storage .bar { height: 6px; background: #2a2e3a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
#storage .bar > div { height: 100%; background: #6b7bff; transition: width .3s; }
#storage .bar > div.warn { background: #ffb24d; }
#storage .bar > div.bad  { background: #ff6b6b; }

.tabs { display: flex; gap: 8px; margin: 0 0 14px; border-bottom: 1px solid #262a36; }
.tab {
  background: transparent; border: none; color: #aeb3c4; font-size: 15px; font-weight: 600;
  padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent;
}
.tab.active { color: #fff; border-bottom-color: #6b7bff; }

#crumbs { font-size: 14px; color: #aeb3c4; padding: 4px 0 12px; }
#crumbs a { color: #8ea2ff; text-decoration: none; cursor: pointer; }
#crumbs a:hover { text-decoration: underline; }

#bToolbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 0 14px; border-bottom: 1px solid #20232e;
}
#bToolbar button, #bToolbar select {
  background: #262a36; color: #cfd3df; border: none; border-radius: 8px;
  padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
}
#bToolbar select { padding: 8px 10px; }
#bToolbar button.danger { background: #4a1f1f; color: #ff9a9a; }
#bToolbar button:disabled { opacity: .45; cursor: default; }
#bToolbar .spacer { flex: 1; }
#selInfo { font-size: 13px; color: #aeb3c4; }

#bList {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px; padding-top: 14px;
}
/* List view: rows with thumbnail + name + meta + size */
#bList.list {
  display: block;
}
#bList.list .bitem {
  display: grid;
  grid-template-columns: 48px 1fr 150px 110px 28px;
  align-items: center; gap: 12px;
  padding: 8px 12px; margin-bottom: 4px;
}
#bList.list .bitem .thumb {
  width: 48px; height: 48px; border-radius: 6px;
}
#bList.list .bitem .folder { width: 36px; height: 28px; }
#bList.list .bitem .folder::before { width: 16px; height: 7px; top: -5px; }
#bList.list .bitem .nm { margin-top: 0; font-size: 14px; }
#bList.list .bitem .sub { display: none; }
#bList.list .bitem .meta {
  font-size: 12px; color: #aeb3c4; text-align: right; font-variant-numeric: tabular-nums;
}
#bList.list .bitem .sz {
  font-size: 12px; color: #aeb3c4; text-align: right; font-variant-numeric: tabular-nums;
}
#bList.list .bitem .check {
  position: static; margin-left: auto;
}
.bitem .meta { display: none; }   /* hidden in grid view */
.bitem .sz   { display: none; }   /* hidden in grid view */

#bPager {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 0 8px; font-size: 13px; color: #aeb3c4;
}
#bPager button {
  background: #262a36; color: #cfd3df; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
}
#bPager button:disabled { opacity: .35; cursor: default; }
.bitem {
  position: relative; background: #1a1d28; border-radius: 10px; padding: 8px;
  cursor: pointer; user-select: none; border: 2px solid transparent;
}
.bitem.sel { border-color: #6b7bff; background: #1d2438; }
.bitem .thumb {
  width: 100%; height: 110px; background: #0c0d11; border-radius: 6px;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.bitem .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bitem .folder {
  width: 56px; height: 44px; background: #6b7bff; border-radius: 4px;
  position: relative;
}
.bitem .folder::before {
  content: ""; position: absolute; top: -8px; left: 0; width: 24px; height: 10px;
  background: #6b7bff; border-radius: 4px 4px 0 0;
}
.bitem .nm {
  font-size: 12px; color: #e8e9ee; margin-top: 6px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.bitem .sub {
  font-size: 11px; color: #6f7a93; margin-top: 1px;
}
.bitem .check {
  position: absolute; top: 6px; right: 6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(0,0,0,.55); border: 1.5px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff;
}
.bitem.sel .check { background: #6b7bff; border-color: #6b7bff; }
.bitem.sel .check::before { content: "\2713"; }

#emptyBrowse { color: #6f7a93; text-align: center; padding: 24px; font-size: 14px; }

.queue { margin-top: 16px; }
.qrow {
  display: grid;
  grid-template-columns: 1fr 110px 88px;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: #1a1d28;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}
.qname {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.qname .sz { color: #6f7a93; font-size: 12px; margin-left: 6px; }
.qbar {
  height: 6px;
  background: #2a2e3a;
  border-radius: 3px;
  overflow: hidden;
}
.qbar > div {
  height: 100%;
  background: #6b7bff;
  width: 0;
  transition: width .15s;
}
.qstatus { font-size: 12px; color: #aeb3c4; text-align: right; }
.qrow.done   { background: #1b2a1c; }
.qrow.done   .qstatus { color: #6bff8e; }
.qrow.done   .qbar > div { background: #6bff8e; width: 100% !important; }
.qrow.done.hide { display: none; }
.qrow.q-far { display: none; }
.qmore {
  padding: 8px 12px;
  font-size: 12px;
  color: #8b90a6;
  text-align: center;
}
.qrow.failed { background: #2b1b1b; }
.qrow.failed .qstatus { color: #ff6b6b; }
.qrow.failed .qbar > div { background: #ff6b6b; }
.qrow.active .qstatus { color: #e8e9ee; }
.cancelled .qstatus { color: #6f7a93; }
</style>
</head>
<body>
<div class="wrap">
  <h1>zpix uploader</h1>
  <p class="sub">Send photos to the frame, or manage what's already there.</p>

  <div id="storage"></div>

  <div class="tabs">
    <button class="tab active" data-tab="upload" type="button">Upload</button>
    <button class="tab" data-tab="browse" type="button">Browse</button>
  </div>

  <div id="view-upload">
  <div class="drop" id="drop">
    <p>Tap to choose photos or a folder, or drag and drop here</p>
    <input type="file" id="files" multiple accept="image/*">
    <input type="file" id="folder" webkitdirectory directory mozdirectory style="display:none">
    <div class="actions">
      <button class="btn ghost" id="pickFolder" type="button" onclick="document.getElementById('folder').click()">Choose folder</button>
      <button class="btn ghost" id="clear" type="button" disabled>Clear</button>
      <button class="btn" id="send" type="button" disabled>Send to frame</button>
    </div>
  </div>

  <div id="summary">
    <div class="head" id="sumHead"></div>
    <div class="bar"><div id="sumBar"></div></div>
    <div class="current" id="sumCurrent"></div>
    <div class="toggle" id="sumToggle"></div>
  </div>
  <div id="queue" class="queue"></div>
  </div><!-- /#view-upload -->

  <div id="view-browse" hidden>
    <div id="crumbs"></div>
    <div id="bToolbar">
      <button id="bNew" type="button">New folder</button>
      <button id="bRefresh" type="button">Refresh</button>
      <button id="bSelAll" type="button">Select all</button>
      <button id="bDelete" type="button" class="danger" disabled>Delete</button>
      <button id="bRename" type="button" disabled>Rename</button>
      <span id="selInfo"></span>
      <span class="spacer"></span>
      <select id="bSort" title="Sort by">
        <option value="name">Name</option>
        <option value="size">Size</option>
        <option value="mtime">Date</option>
      </select>
      <button id="bSortDir" type="button" title="Sort direction">A→Z</button>
      <button id="bView" type="button" title="View">List</button>
    </div>
    <div id="bList"></div>
    <div id="bPager"></div>
  </div>
</div>

<script>
(function () {
  var drop = document.getElementById("drop");
  var inp = document.getElementById("files");
  var sendBtn = document.getElementById("send");
  var clearBtn = document.getElementById("clear");
  var summary = document.getElementById("summary");
  var sumHead = document.getElementById("sumHead");
  var sumBar = document.getElementById("sumBar");
  var sumCurrent = document.getElementById("sumCurrent");
  var sumToggle = document.getElementById("sumToggle");
  var queue = document.getElementById("queue");
  var items = [];           // { file, row, bar, status, state, xhr }
  var sending = false;
  var cancelRequested = false;
  var showDone = false;     // when true, completed rows stay visible

  function fmtSize(n) {
    if (n < 1024) return n + " B";
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
    if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
    return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
  }
  function fetchStorage() {
    var el = document.getElementById("storage");
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/info");
    xhr.onload = function () {
      try {
        var j = JSON.parse(xhr.responseText || "{}");
        if (!j.total) { el.innerHTML = ""; return; }
        var usedPct = Math.round(j.used / j.total * 100);
        var freePct = 100 - usedPct;
        var cls = usedPct >= 95 ? "bad" : (usedPct >= 85 ? "warn" : "");
        el.innerHTML =
          "<b>" + fmtSize(j.free) + " free</b> · " + fmtSize(j.used) + " used of " + fmtSize(j.total) +
          " &nbsp;·&nbsp; uploads folder: " + (j.uploads || 0) + " photo" +
          ((j.uploads === 1) ? "" : "s") + " (" + fmtSize(j.uploadsBytes || 0) + ")" +
          "<div class=\"bar\"><div class=\"" + cls + "\" style=\"width:" + usedPct + "%\"></div></div>";
      } catch (e) { el.innerHTML = ""; }
    };
    xhr.onerror = function () { el.innerHTML = ""; };
    xhr.send();
  }
  fetchStorage();

  function render() {
    queue.innerHTML = "";
    items.forEach(function (it, i) {
      var row = document.createElement("div");
      row.className = "qrow";
      var name = document.createElement("div"); name.className = "qname";
      name.innerHTML = "<b>" + (i + 1) + ".</b> " + escapeHtml(it.relPath || it.file.name) + " <span class=\"sz\">" + fmtSize(it.file.size) + "</span>";
      var bar = document.createElement("div"); bar.className = "qbar";
      var fill = document.createElement("div"); bar.appendChild(fill);
      var status = document.createElement("div"); status.className = "qstatus"; status.textContent = "Queued";
      row.appendChild(name); row.appendChild(bar); row.appendChild(status);
      queue.appendChild(row);
      it.row = row; it.bar = fill; it.status = status; it.state = "queued";
    });
    applyQueuedWindow();
    updateButtons();
    updateOverall();
  }

  function escapeHtml(s) { return s.replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]; }); }

  var WINDOW = 12; // max queued rows visible at once
  function setStatus(it, state, text, pct) {
    var changed = it.state !== state;
    it.state = state;
    it.row.classList.remove("active", "done", "failed", "cancelled");
    if (state === "active")    it.row.classList.add("active");
    if (state === "done")      it.row.classList.add("done");
    if (state === "failed")    it.row.classList.add("failed");
    if (state === "cancelled") it.row.classList.add("cancelled");
    if (text != null) it.status.textContent = text;
    if (pct != null) it.bar.style.width = pct + "%";
    if (state === "done" && !showDone) it.row.classList.add("hide");
    else it.row.classList.remove("hide");
    // visibility window only matters on transitions, not on per-tick progress
    if (changed) applyQueuedWindow();
  }
  // Hide queued rows beyond a fixed window so the visible list stays bounded
  // even with thousands of files; the summary panel still shows the totals.
  function applyQueuedWindow() {
    var shown = 0;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.state === "queued") {
        if (shown < WINDOW) { it.row.classList.remove("q-far"); shown++; }
        else { it.row.classList.add("q-far"); }
      } else {
        it.row.classList.remove("q-far");
      }
    }
    var existing = document.getElementById("qmore");
    if (existing) existing.parentNode.removeChild(existing);
    var totalQueued = items.filter(function (x) { return x.state === "queued"; }).length;
    if (totalQueued > shown) {
      var more = document.createElement("div");
      more.id = "qmore";
      more.className = "qmore";
      more.textContent = "+ " + (totalQueued - shown) + " more queued";
      queue.appendChild(more);
    }
  }

  function updateButtons() {
    if (sending) {
      sendBtn.textContent = "Cancel";
      sendBtn.disabled = false;
      clearBtn.disabled = true;
      inp.disabled = true;
    } else {
      var pending = items.filter(function (x) { return x.state === "queued" || x.state === "failed"; }).length;
      sendBtn.textContent = pending ? "Send " + pending + " photo" + (pending === 1 ? "" : "s") : "Send to frame";
      sendBtn.disabled = items.length === 0;
      clearBtn.disabled = items.length === 0;
      inp.disabled = false;
    }
  }

  function updateOverall() {
    if (!items.length) { summary.classList.remove("on"); return; }
    summary.classList.add("on");
    var done = 0, failed = 0, queued = 0, active = null;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.state === "done") done++;
      else if (it.state === "failed") failed++;
      else if (it.state === "active") active = it;
      else queued++;
    }
    var total = items.length;
    var processed = done + failed;
    var pct = Math.round(processed / total * 100);
    var parts = [];
    parts.push("<b>" + done + "</b> / " + total + " uploaded");
    if (failed) parts.push("<span class=\"bad\"><b>" + failed + "</b> failed</span>");
    if (queued) parts.push("<span class=\"dim\">" + queued + " queued</span>");
    sumHead.innerHTML = parts.join(" · ");
    sumBar.style.width = pct + "%";
    sumCurrent.innerHTML = active
      ? "Current: <b>" + escapeHtml(active.file.name) + "</b>"
      : (sending ? "Preparing…" : (processed === total ? "Done." : ""));
    if (done > 0) {
      sumToggle.textContent = showDone ? "Hide " + done + " completed" : "Show " + done + " completed";
      sumToggle.style.display = "inline-block";
    } else {
      sumToggle.style.display = "none";
    }
  }
  sumToggle.addEventListener("click", function () {
    showDone = !showDone;
    items.forEach(function (it) {
      if (it.state === "done") {
        if (showDone) it.row.classList.remove("hide");
        else it.row.classList.add("hide");
      }
    });
    updateOverall();
  });

  function addFiles(list) {
    var arr = Array.prototype.slice.call(list).filter(function (f) {
      return /^image\//i.test(f.type) || /\.(jpe?g|png|gif|webp|bmp)$/i.test(f.name);
    });
    // dedupe by name+size and add
    arr.forEach(function (f) {
      var rel = f.webkitRelativePath || f._relPath || "";
      var key = (rel || f.name) + ":" + f.size;
      var dup = items.some(function (x) { return ((x.relPath || x.file.name) + ":" + x.file.size) === key; });
      if (!dup) items.push({ file: f, relPath: rel || null });
    });
    render();
  }

  ["dragenter", "dragover"].forEach(function (e) {
    drop.addEventListener(e, function (ev) { ev.preventDefault(); drop.classList.add("over"); });
  });
  ["dragleave", "drop"].forEach(function (e) {
    drop.addEventListener(e, function (ev) { ev.preventDefault(); drop.classList.remove("over"); });
  });

  // Walk a DataTransferItemList; if any item is a directory, recurse into it.
  // Returns an array of File objects (with _relPath set when from a folder).
  function walkEntry(entry, prefix) {
    return new Promise(function (resolve) {
      if (entry.isFile) {
        entry.file(function (f) {
          try { f._relPath = (prefix ? prefix + "/" : "") + f.name; } catch (e) { }
          resolve([f]);
        }, function () { resolve([]); });
      } else if (entry.isDirectory) {
        var reader = entry.createReader();
        var collected = [];
        var readBatch = function () {
          reader.readEntries(function (entries) {
            if (!entries.length) { resolve(collected); return; }
            Promise.all(entries.map(function (e) {
              return walkEntry(e, (prefix ? prefix + "/" : "") + entry.name);
            })).then(function (arrays) {
              arrays.forEach(function (a) { collected = collected.concat(a); });
              readBatch(); // may need multiple reads for large dirs
            });
          }, function () { resolve(collected); });
        };
        readBatch();
      } else { resolve([]); }
    });
  }

  drop.addEventListener("drop", function (ev) {
    var dt = ev.dataTransfer;
    if (dt.items && dt.items.length && dt.items[0].webkitGetAsEntry) {
      var promises = [];
      for (var i = 0; i < dt.items.length; i++) {
        var it = dt.items[i];
        if (it.kind !== "file") continue;
        var entry = it.webkitGetAsEntry();
        if (entry) promises.push(walkEntry(entry, ""));
        else {
          var f = it.getAsFile();
          if (f) promises.push(Promise.resolve([f]));
        }
      }
      Promise.all(promises).then(function (arrays) {
        var flat = []; arrays.forEach(function (a) { flat = flat.concat(a); });
        addFiles(flat);
      });
    } else {
      addFiles(dt.files);
    }
  });
  inp.addEventListener("change", function () { addFiles(inp.files); inp.value = ""; });
  document.getElementById("folder").addEventListener("change", function (e) {
    addFiles(e.target.files); e.target.value = "";
  });

  clearBtn.addEventListener("click", function () {
    if (sending) return;
    items = []; queue.innerHTML = ""; updateButtons(); updateOverall();
  });

  sendBtn.addEventListener("click", async function () {
    if (sending) { cancelRequested = true; return; }
    cancelRequested = false;
    sending = true; updateButtons();
    for (var i = 0; i < items.length; i++) {
      if (cancelRequested) {
        for (var j = i; j < items.length; j++) {
          if (items[j].state === "queued") setStatus(items[j], "cancelled", "Cancelled");
        }
        break;
      }
      if (items[i].state === "done") continue;
      await uploadOne(items[i]);
      updateOverall();
    }
    sending = false; updateButtons(); updateOverall();
    fetchStorage();
  });

  // ---------- tabs ----------
  var tabUpload = document.querySelector('.tab[data-tab="upload"]');
  var tabBrowse = document.querySelector('.tab[data-tab="browse"]');
  var viewUpload = document.getElementById("view-upload");
  var viewBrowse = document.getElementById("view-browse");
  tabUpload.addEventListener("click", function () { showTab("upload"); });
  tabBrowse.addEventListener("click", function () { showTab("browse"); browseTo(currentBrowse); });
  function showTab(name) {
    tabUpload.classList.toggle("active", name === "upload");
    tabBrowse.classList.toggle("active", name === "browse");
    viewUpload.hidden = name !== "upload";
    viewBrowse.hidden = name !== "browse";
  }

  // ---------- browse ----------
  var currentBrowse = "";
  var bData = { items: [] };
  var selected = {}; // path -> true
  var bList = document.getElementById("bList");
  var crumbs = document.getElementById("crumbs");
  var selInfo = document.getElementById("selInfo");
  var bDelete = document.getElementById("bDelete");
  var bRename = document.getElementById("bRename");
  var bPager = document.getElementById("bPager");
  var bSortSel = document.getElementById("bSort");
  var bSortDir = document.getElementById("bSortDir");
  var bView = document.getElementById("bView");

  function readPref(key, fallback) {
    try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; }
  }
  function writePref(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }

  var viewMode = readPref("zpix_view", "grid");      // grid | list
  var sortBy   = readPref("zpix_sort", "name");      // name | size | mtime
  var sortDir  = readPref("zpix_sortdir", "asc");    // asc | desc
  var page     = 0;
  var pageSize = 100;

  bSortSel.value = sortBy;
  bSortDir.textContent = sortDirLabel();
  bView.textContent = viewMode === "list" ? "Grid" : "List";

  function sortDirLabel() {
    if (sortBy === "name") return sortDir === "asc" ? "A→Z" : "Z→A";
    if (sortBy === "size") return sortDir === "asc" ? "small→big" : "big→small";
    return sortDir === "asc" ? "old→new" : "new→old";
  }
  bSortSel.addEventListener("change", function () {
    sortBy = bSortSel.value; writePref("zpix_sort", sortBy);
    bSortDir.textContent = sortDirLabel();
    page = 0; renderBrowse();
  });
  bSortDir.addEventListener("click", function () {
    sortDir = sortDir === "asc" ? "desc" : "asc"; writePref("zpix_sortdir", sortDir);
    bSortDir.textContent = sortDirLabel();
    page = 0; renderBrowse();
  });
  bView.addEventListener("click", function () {
    viewMode = viewMode === "list" ? "grid" : "list"; writePref("zpix_view", viewMode);
    bView.textContent = viewMode === "list" ? "Grid" : "List";
    renderBrowse();
  });

  function sortedItems() {
    var arr = bData.items.slice();
    var dir = sortDir === "asc" ? 1 : -1;
    arr.sort(function (a, b) {
      // folders always before files
      if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
      var va, vb;
      if (sortBy === "size") { va = a.isDir ? -1 : a.size; vb = b.isDir ? -1 : b.size; return dir * (va - vb); }
      if (sortBy === "mtime") { va = a.mtime || 0; vb = b.mtime || 0; return dir * (va - vb); }
      return dir * a.name.toLowerCase().localeCompare(b.name.toLowerCase());
    });
    return arr;
  }

  function fmtDate(ms) {
    if (!ms) return "";
    var d = new Date(ms);
    var now = new Date();
    var sameYear = d.getFullYear() === now.getFullYear();
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
    var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
    if (sameYear) return mo + " " + d.getDate() + ", " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    return mo + " " + d.getDate() + ", " + d.getFullYear();
  }

  document.getElementById("bRefresh").addEventListener("click", function () { browseTo(currentBrowse); });
  document.getElementById("bSelAll").addEventListener("click", function () {
    var any = Object.keys(selected).length === 0;
    selected = {};
    if (any) bData.items.forEach(function (it) { selected[it.path] = true; });
    renderBrowse();
  });
  document.getElementById("bNew").addEventListener("click", function () {
    var name = prompt("New folder name:");
    if (!name) return;
    api("POST", "/mkdir", { path: currentBrowse, name: name }).then(function (j) {
      if (j && j.ok) browseTo(currentBrowse);
      else alert("Failed: " + ((j && j.error) || "could not create"));
    });
  });
  bRename.addEventListener("click", function () {
    var paths = Object.keys(selected);
    if (paths.length !== 1) return;
    var path = paths[0];
    var current = bData.items.filter(function (x) { return x.path === path; })[0];
    if (!current) return;
    var newName = prompt("Rename '" + current.name + "' to:", current.name);
    if (!newName || newName === current.name) return;
    api("POST", "/rename", { path: path, newName: newName }).then(function (j) {
      if (j && j.ok) { selected = {}; browseTo(currentBrowse); }
      else alert("Failed: " + ((j && j.error) || "could not rename"));
    });
  });
  bDelete.addEventListener("click", function () {
    var paths = Object.keys(selected);
    if (!paths.length) return;
    if (!confirm("Delete " + paths.length + " item" + (paths.length === 1 ? "" : "s") + "? This cannot be undone.")) return;
    api("POST", "/delete", { paths: paths }).then(function (j) {
      selected = {};
      browseTo(currentBrowse);
      if (j && j.failed) alert(j.failed + " could not be deleted.");
    });
  });

  function api(method, url, body) {
    return new Promise(function (resolve) {
      var xhr = new XMLHttpRequest();
      xhr.open(method, url);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.onload = function () { try { resolve(JSON.parse(xhr.responseText || "{}")); } catch (e) { resolve({}); } };
      xhr.onerror = function () { resolve({}); };
      xhr.send(body ? JSON.stringify(body) : null);
    });
  }

  function browseTo(rel) {
    currentBrowse = rel || "";
    selected = {};
    page = 0;
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/browse?path=" + encodeURIComponent(currentBrowse));
    xhr.onload = function () {
      try { bData = JSON.parse(xhr.responseText || "{}"); } catch (e) { bData = { items: [] }; }
      if (!bData.items) bData.items = [];
      renderBrowse();
    };
    xhr.onerror = function () { bData = { items: [] }; renderBrowse(); };
    xhr.send();
  }

  function renderBrowse() {
    // crumbs
    crumbs.innerHTML = "";
    var aRoot = document.createElement("a");
    aRoot.textContent = "uploads";
    aRoot.addEventListener("click", function () { browseTo(""); });
    crumbs.appendChild(aRoot);
    if (currentBrowse) {
      var segs = currentBrowse.split("/");
      var acc = "";
      segs.forEach(function (s, i) {
        crumbs.appendChild(document.createTextNode(" / "));
        acc = acc ? acc + "/" + s : s;
        if (i === segs.length - 1) {
          var span = document.createElement("span");
          span.textContent = s;
          crumbs.appendChild(span);
        } else {
          var a = document.createElement("a");
          a.textContent = s;
          (function (p) { a.addEventListener("click", function () { browseTo(p); }); })(acc);
          crumbs.appendChild(a);
        }
      });
    }
    // items
    bList.className = viewMode === "list" ? "list" : "";
    bList.innerHTML = "";
    var all = sortedItems();
    var total = all.length;
    var pages = Math.max(1, Math.ceil(total / pageSize));
    if (page >= pages) page = pages - 1;
    if (page < 0) page = 0;
    var slice = all.slice(page * pageSize, page * pageSize + pageSize);

    if (!total) {
      var em = document.createElement("div"); em.id = "emptyBrowse";
      em.textContent = "This folder is empty.";
      bList.appendChild(em);
    } else {
      slice.forEach(function (it) { bList.appendChild(buildItem(it)); });
    }
    renderPager(total, pages);
    updateSelInfo();
  }

  function renderPager(total, pages) {
    bPager.innerHTML = "";
    if (total <= pageSize) {
      if (total > 0) {
        var n = document.createElement("span");
        n.textContent = total + " item" + (total === 1 ? "" : "s");
        bPager.appendChild(n);
      }
      return;
    }
    var first = document.createElement("button"); first.textContent = "« First";
    first.disabled = page === 0;
    first.addEventListener("click", function () { page = 0; renderBrowse(); window.scrollTo(0, 0); });
    var prev = document.createElement("button"); prev.textContent = "‹ Prev";
    prev.disabled = page === 0;
    prev.addEventListener("click", function () { page--; renderBrowse(); window.scrollTo(0, 0); });
    var info = document.createElement("span");
    var startN = page * pageSize + 1;
    var endN = Math.min(total, (page + 1) * pageSize);
    info.textContent = startN + "–" + endN + " of " + total + "  ·  page " + (page + 1) + "/" + pages;
    var next = document.createElement("button"); next.textContent = "Next ›";
    next.disabled = page >= pages - 1;
    next.addEventListener("click", function () { page++; renderBrowse(); window.scrollTo(0, 0); });
    var last = document.createElement("button"); last.textContent = "Last »";
    last.disabled = page >= pages - 1;
    last.addEventListener("click", function () { page = pages - 1; renderBrowse(); window.scrollTo(0, 0); });
    bPager.appendChild(first); bPager.appendChild(prev);
    bPager.appendChild(info);
    bPager.appendChild(next); bPager.appendChild(last);
  }

  function buildItem(it) {
    var el = document.createElement("div"); el.className = "bitem";
    if (selected[it.path]) el.classList.add("sel");
    var thumb = document.createElement("div"); thumb.className = "thumb";
    if (it.isDir) {
      var fi = document.createElement("div"); fi.className = "folder";
      thumb.appendChild(fi);
    } else if (it.isImage) {
      var img = document.createElement("img");
      img.loading = "lazy";
      img.src = "/file?path=" + encodeURIComponent(it.path);
      thumb.appendChild(img);
    } else {
      var dot = it.name.lastIndexOf(".");
      var ext = dot >= 0 ? it.name.substring(dot + 1).toUpperCase() : "FILE";
      var d = document.createElement("div"); d.style.color = "#6f7a93"; d.style.fontSize = "13px"; d.textContent = ext;
      thumb.appendChild(d);
    }
    var nm = document.createElement("div"); nm.className = "nm"; nm.textContent = it.name;
    var sub = document.createElement("div"); sub.className = "sub";
    sub.textContent = it.isDir ? (it.count + " item" + (it.count === 1 ? "" : "s")) : fmtSize(it.size);
    // list-view columns (CSS hides these in grid view)
    var meta = document.createElement("div"); meta.className = "meta"; meta.textContent = fmtDate(it.mtime);
    var sz = document.createElement("div"); sz.className = "sz";
    sz.textContent = it.isDir ? (it.count + " item" + (it.count === 1 ? "" : "s")) : fmtSize(it.size);
    var chk = document.createElement("div"); chk.className = "check";
    el.appendChild(thumb); el.appendChild(nm); el.appendChild(sub); el.appendChild(meta); el.appendChild(sz); el.appendChild(chk);
    chk.addEventListener("click", function (e) {
      e.stopPropagation();
      if (selected[it.path]) delete selected[it.path]; else selected[it.path] = true;
      renderBrowse();
    });
    el.addEventListener("click", function () {
      if (it.isDir) browseTo(it.path);
      else {
        if (selected[it.path]) delete selected[it.path]; else selected[it.path] = true;
        renderBrowse();
      }
    });
    return el;
  }

  function updateSelInfo() {
    var n = Object.keys(selected).length;
    bDelete.disabled = n === 0;
    bRename.disabled = n !== 1;
    selInfo.textContent = n ? (n + " selected") : "";
  }

  function uploadOne(it) {
    return new Promise(function (resolve) {
      setStatus(it, "active", "Uploading 0%", 0);
      var xhr = new XMLHttpRequest();
      it.xhr = xhr;
      xhr.open("POST", "/upload");
      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          var pct = Math.round(e.loaded / e.total * 100);
          setStatus(it, "active", "Uploading " + pct + "%", pct);
        }
      };
      xhr.onload = function () {
        if (xhr.status >= 200 && xhr.status < 300) {
          var saved = 0;
          try { saved = (JSON.parse(xhr.responseText || "{}").saved | 0); } catch (e) { saved = 1; }
          if (saved > 0) setStatus(it, "done", "Saved", 100);
          else setStatus(it, "failed", "Not saved", 0);
        } else {
          setStatus(it, "failed", "HTTP " + xhr.status, 0);
        }
        resolve();
      };
      xhr.onerror = function () { setStatus(it, "failed", "Network error", 0); resolve(); };
      xhr.onabort = function () { setStatus(it, "cancelled", "Cancelled", 0); resolve(); };
      var fd = new FormData();
      var sendName = it.relPath || it.file.name;
      fd.append("file", it.file, sendName);
      try { xhr.send(fd); } catch (e) { setStatus(it, "failed", "Send failed", 0); resolve(); }
    });
  }
})();
</script>
</body>
</html>

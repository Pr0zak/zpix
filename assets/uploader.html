<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zpix uploader</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  margin: 0;
  padding: 24px;
  background: #15171f;
  color: #e8e9ee;
  min-height: 100vh;
}
.wrap { max-width: 720px; margin: 0 auto; }
h1 { margin: 0 0 6px; font-size: 26px; }
.sub { color: #aeb3c4; margin: 0 0 22px; }
.drop {
  border: 2px dashed #353a4a;
  border-radius: 14px;
  padding: 28px 20px;
  text-align: center;
  background: #1a1d28;
  transition: border-color .15s, background .15s;
}
.drop.over { border-color: #6b7bff; background: #1d2438; }
.drop p { margin: 0 0 12px; color: #aeb3c4; }
.drop input[type=file] {
  display: block;
  margin: 8px auto 14px;
  font-size: 14px;
  color: #cfd3df;
}
.actions { margin-top: 14px; display: flex; gap: 12px; justify-content: center; }
.btn {
  padding: 12px 22px;
  background: #6b7bff;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.btn.ghost { background: #262a36; color: #cfd3df; }
.btn:disabled { opacity: .45; cursor: default; }

#summary {
  margin-top: 18px;
  background: #1a1d28;
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
}
#summary.on { display: block; }
#summary .head { display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; color: #cfd3df; }
#summary .head b { color: #fff; }
#summary .head .ok { color: #6bff8e; }
#summary .head .bad { color: #ff6b6b; }
#summary .head .dim { color: #6f7a93; }
#summary .bar { height: 8px; background: #2a2e3a; border-radius: 4px; overflow: hidden; margin-top: 10px; }
#summary .bar > div { height: 100%; background: #6b7bff; width: 0; transition: width .25s; }
#summary .current { margin-top: 10px; font-size: 13px; color: #aeb3c4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#summary .current b { color: #e8e9ee; }
#summary .toggle { margin-top: 8px; font-size: 13px; color: #8ea2ff; cursor: pointer; user-select: none; }

#storage {
  margin: 0 0 18px;
  padding: 10px 14px;
  background: #1a1d28;
  border-radius: 10px;
  font-size: 13px;
  color: #aeb3c4;
}
#storage b { color: #fff; }
#storage .bar { height: 6px; background: #2a2e3a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
#storage .bar > div { height: 100%; background: #6b7bff; transition: width .3s; }
#storage .bar > div.warn { background: #ffb24d; }
#storage .bar > div.bad  { background: #ff6b6b; }

.queue { margin-top: 16px; }
.qrow {
  display: grid;
  grid-template-columns: 1fr 110px 88px;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: #1a1d28;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}
.qname {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.qname .sz { color: #6f7a93; font-size: 12px; margin-left: 6px; }
.qbar {
  height: 6px;
  background: #2a2e3a;
  border-radius: 3px;
  overflow: hidden;
}
.qbar > div {
  height: 100%;
  background: #6b7bff;
  width: 0;
  transition: width .15s;
}
.qstatus { font-size: 12px; color: #aeb3c4; text-align: right; }
.qrow.done   { background: #1b2a1c; }
.qrow.done   .qstatus { color: #6bff8e; }
.qrow.done   .qbar > div { background: #6bff8e; width: 100% !important; }
.qrow.done.hide { display: none; }
.qrow.q-far { display: none; }
.qmore {
  padding: 8px 12px;
  font-size: 12px;
  color: #8b90a6;
  text-align: center;
}
.qrow.failed { background: #2b1b1b; }
.qrow.failed .qstatus { color: #ff6b6b; }
.qrow.failed .qbar > div { background: #ff6b6b; }
.qrow.active .qstatus { color: #e8e9ee; }
.cancelled .qstatus { color: #6f7a93; }
</style>
</head>
<body>
<div class="wrap">
  <h1>zpix uploader</h1>
  <p class="sub">Drop photos here to send them to the frame. They'll appear in the slideshow on the next restart.</p>

  <div id="storage"></div>

  <div class="drop" id="drop">
    <p>Tap to choose photos or a folder, or drag and drop here</p>
    <input type="file" id="files" multiple accept="image/*">
    <input type="file" id="folder" webkitdirectory directory style="display:none">
    <div class="actions">
      <button class="btn ghost" id="pickFolder" type="button">Choose folder</button>
      <button class="btn ghost" id="clear" type="button" disabled>Clear</button>
      <button class="btn" id="send" type="button" disabled>Send to frame</button>
    </div>
  </div>

  <div id="summary">
    <div class="head" id="sumHead"></div>
    <div class="bar"><div id="sumBar"></div></div>
    <div class="current" id="sumCurrent"></div>
    <div class="toggle" id="sumToggle"></div>
  </div>
  <div id="queue" class="queue"></div>
</div>

<script>
(function () {
  var drop = document.getElementById("drop");
  var inp = document.getElementById("files");
  var sendBtn = document.getElementById("send");
  var clearBtn = document.getElementById("clear");
  var summary = document.getElementById("summary");
  var sumHead = document.getElementById("sumHead");
  var sumBar = document.getElementById("sumBar");
  var sumCurrent = document.getElementById("sumCurrent");
  var sumToggle = document.getElementById("sumToggle");
  var queue = document.getElementById("queue");
  var items = [];           // { file, row, bar, status, state, xhr }
  var sending = false;
  var cancelRequested = false;
  var showDone = false;     // when true, completed rows stay visible

  function fmtSize(n) {
    if (n < 1024) return n + " B";
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
    if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
    return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
  }
  function fetchStorage() {
    var el = document.getElementById("storage");
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/info");
    xhr.onload = function () {
      try {
        var j = JSON.parse(xhr.responseText || "{}");
        if (!j.total) { el.innerHTML = ""; return; }
        var usedPct = Math.round(j.used / j.total * 100);
        var freePct = 100 - usedPct;
        var cls = usedPct >= 95 ? "bad" : (usedPct >= 85 ? "warn" : "");
        el.innerHTML =
          "<b>" + fmtSize(j.free) + " free</b> · " + fmtSize(j.used) + " used of " + fmtSize(j.total) +
          " &nbsp;·&nbsp; uploads folder: " + (j.uploads || 0) + " photo" +
          ((j.uploads === 1) ? "" : "s") + " (" + fmtSize(j.uploadsBytes || 0) + ")" +
          "<div class=\"bar\"><div class=\"" + cls + "\" style=\"width:" + usedPct + "%\"></div></div>";
      } catch (e) { el.innerHTML = ""; }
    };
    xhr.onerror = function () { el.innerHTML = ""; };
    xhr.send();
  }
  fetchStorage();

  function render() {
    queue.innerHTML = "";
    items.forEach(function (it, i) {
      var row = document.createElement("div");
      row.className = "qrow";
      var name = document.createElement("div"); name.className = "qname";
      name.innerHTML = "<b>" + (i + 1) + ".</b> " + escapeHtml(it.relPath || it.file.name) + " <span class=\"sz\">" + fmtSize(it.file.size) + "</span>";
      var bar = document.createElement("div"); bar.className = "qbar";
      var fill = document.createElement("div"); bar.appendChild(fill);
      var status = document.createElement("div"); status.className = "qstatus"; status.textContent = "Queued";
      row.appendChild(name); row.appendChild(bar); row.appendChild(status);
      queue.appendChild(row);
      it.row = row; it.bar = fill; it.status = status; it.state = "queued";
    });
    applyQueuedWindow();
    updateButtons();
    updateOverall();
  }

  function escapeHtml(s) { return s.replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]; }); }

  var WINDOW = 12; // max queued rows visible at once
  function setStatus(it, state, text, pct) {
    var changed = it.state !== state;
    it.state = state;
    it.row.classList.remove("active", "done", "failed", "cancelled");
    if (state === "active")    it.row.classList.add("active");
    if (state === "done")      it.row.classList.add("done");
    if (state === "failed")    it.row.classList.add("failed");
    if (state === "cancelled") it.row.classList.add("cancelled");
    if (text != null) it.status.textContent = text;
    if (pct != null) it.bar.style.width = pct + "%";
    if (state === "done" && !showDone) it.row.classList.add("hide");
    else it.row.classList.remove("hide");
    // visibility window only matters on transitions, not on per-tick progress
    if (changed) applyQueuedWindow();
  }
  // Hide queued rows beyond a fixed window so the visible list stays bounded
  // even with thousands of files; the summary panel still shows the totals.
  function applyQueuedWindow() {
    var shown = 0;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.state === "queued") {
        if (shown < WINDOW) { it.row.classList.remove("q-far"); shown++; }
        else { it.row.classList.add("q-far"); }
      } else {
        it.row.classList.remove("q-far");
      }
    }
    var existing = document.getElementById("qmore");
    if (existing) existing.parentNode.removeChild(existing);
    var totalQueued = items.filter(function (x) { return x.state === "queued"; }).length;
    if (totalQueued > shown) {
      var more = document.createElement("div");
      more.id = "qmore";
      more.className = "qmore";
      more.textContent = "+ " + (totalQueued - shown) + " more queued";
      queue.appendChild(more);
    }
  }

  function updateButtons() {
    if (sending) {
      sendBtn.textContent = "Cancel";
      sendBtn.disabled = false;
      clearBtn.disabled = true;
      inp.disabled = true;
    } else {
      var pending = items.filter(function (x) { return x.state === "queued" || x.state === "failed"; }).length;
      sendBtn.textContent = pending ? "Send " + pending + " photo" + (pending === 1 ? "" : "s") : "Send to frame";
      sendBtn.disabled = items.length === 0;
      clearBtn.disabled = items.length === 0;
      inp.disabled = false;
    }
  }

  function updateOverall() {
    if (!items.length) { summary.classList.remove("on"); return; }
    summary.classList.add("on");
    var done = 0, failed = 0, queued = 0, active = null;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.state === "done") done++;
      else if (it.state === "failed") failed++;
      else if (it.state === "active") active = it;
      else queued++;
    }
    var total = items.length;
    var processed = done + failed;
    var pct = Math.round(processed / total * 100);
    var parts = [];
    parts.push("<b>" + done + "</b> / " + total + " uploaded");
    if (failed) parts.push("<span class=\"bad\"><b>" + failed + "</b> failed</span>");
    if (queued) parts.push("<span class=\"dim\">" + queued + " queued</span>");
    sumHead.innerHTML = parts.join(" · ");
    sumBar.style.width = pct + "%";
    sumCurrent.innerHTML = active
      ? "Current: <b>" + escapeHtml(active.file.name) + "</b>"
      : (sending ? "Preparing…" : (processed === total ? "Done." : ""));
    if (done > 0) {
      sumToggle.textContent = showDone ? "Hide " + done + " completed" : "Show " + done + " completed";
      sumToggle.style.display = "inline-block";
    } else {
      sumToggle.style.display = "none";
    }
  }
  sumToggle.addEventListener("click", function () {
    showDone = !showDone;
    items.forEach(function (it) {
      if (it.state === "done") {
        if (showDone) it.row.classList.remove("hide");
        else it.row.classList.add("hide");
      }
    });
    updateOverall();
  });

  function addFiles(list) {
    var arr = Array.prototype.slice.call(list).filter(function (f) {
      return /^image\//i.test(f.type) || /\.(jpe?g|png|gif|webp|bmp)$/i.test(f.name);
    });
    // dedupe by name+size and add
    arr.forEach(function (f) {
      var rel = f.webkitRelativePath || f._relPath || "";
      var key = (rel || f.name) + ":" + f.size;
      var dup = items.some(function (x) { return ((x.relPath || x.file.name) + ":" + x.file.size) === key; });
      if (!dup) items.push({ file: f, relPath: rel || null });
    });
    render();
  }

  ["dragenter", "dragover"].forEach(function (e) {
    drop.addEventListener(e, function (ev) { ev.preventDefault(); drop.classList.add("over"); });
  });
  ["dragleave", "drop"].forEach(function (e) {
    drop.addEventListener(e, function (ev) { ev.preventDefault(); drop.classList.remove("over"); });
  });

  // Walk a DataTransferItemList; if any item is a directory, recurse into it.
  // Returns an array of File objects (with _relPath set when from a folder).
  function walkEntry(entry, prefix) {
    return new Promise(function (resolve) {
      if (entry.isFile) {
        entry.file(function (f) {
          try { f._relPath = (prefix ? prefix + "/" : "") + f.name; } catch (e) { }
          resolve([f]);
        }, function () { resolve([]); });
      } else if (entry.isDirectory) {
        var reader = entry.createReader();
        var collected = [];
        var readBatch = function () {
          reader.readEntries(function (entries) {
            if (!entries.length) { resolve(collected); return; }
            Promise.all(entries.map(function (e) {
              return walkEntry(e, (prefix ? prefix + "/" : "") + entry.name);
            })).then(function (arrays) {
              arrays.forEach(function (a) { collected = collected.concat(a); });
              readBatch(); // may need multiple reads for large dirs
            });
          }, function () { resolve(collected); });
        };
        readBatch();
      } else { resolve([]); }
    });
  }

  drop.addEventListener("drop", function (ev) {
    var dt = ev.dataTransfer;
    if (dt.items && dt.items.length && dt.items[0].webkitGetAsEntry) {
      var promises = [];
      for (var i = 0; i < dt.items.length; i++) {
        var it = dt.items[i];
        if (it.kind !== "file") continue;
        var entry = it.webkitGetAsEntry();
        if (entry) promises.push(walkEntry(entry, ""));
        else {
          var f = it.getAsFile();
          if (f) promises.push(Promise.resolve([f]));
        }
      }
      Promise.all(promises).then(function (arrays) {
        var flat = []; arrays.forEach(function (a) { flat = flat.concat(a); });
        addFiles(flat);
      });
    } else {
      addFiles(dt.files);
    }
  });
  inp.addEventListener("change", function () { addFiles(inp.files); inp.value = ""; });
  document.getElementById("pickFolder").addEventListener("click", function () {
    document.getElementById("folder").click();
  });
  document.getElementById("folder").addEventListener("change", function (e) {
    addFiles(e.target.files); e.target.value = "";
  });

  clearBtn.addEventListener("click", function () {
    if (sending) return;
    items = []; queue.innerHTML = ""; updateButtons(); updateOverall();
  });

  sendBtn.addEventListener("click", async function () {
    if (sending) { cancelRequested = true; return; }
    cancelRequested = false;
    sending = true; updateButtons();
    for (var i = 0; i < items.length; i++) {
      if (cancelRequested) {
        for (var j = i; j < items.length; j++) {
          if (items[j].state === "queued") setStatus(items[j], "cancelled", "Cancelled");
        }
        break;
      }
      if (items[i].state === "done") continue;
      await uploadOne(items[i]);
      updateOverall();
    }
    sending = false; updateButtons(); updateOverall();
    fetchStorage();
  });

  function uploadOne(it) {
    return new Promise(function (resolve) {
      setStatus(it, "active", "Uploading 0%", 0);
      var xhr = new XMLHttpRequest();
      it.xhr = xhr;
      xhr.open("POST", "/upload");
      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          var pct = Math.round(e.loaded / e.total * 100);
          setStatus(it, "active", "Uploading " + pct + "%", pct);
        }
      };
      xhr.onload = function () {
        if (xhr.status >= 200 && xhr.status < 300) {
          var saved = 0;
          try { saved = (JSON.parse(xhr.responseText || "{}").saved | 0); } catch (e) { saved = 1; }
          if (saved > 0) setStatus(it, "done", "Saved", 100);
          else setStatus(it, "failed", "Not saved", 0);
        } else {
          setStatus(it, "failed", "HTTP " + xhr.status, 0);
        }
        resolve();
      };
      xhr.onerror = function () { setStatus(it, "failed", "Network error", 0); resolve(); };
      xhr.onabort = function () { setStatus(it, "cancelled", "Cancelled", 0); resolve(); };
      var fd = new FormData();
      fd.append("file", it.file, it.file.name);
      try { xhr.send(fd); } catch (e) { setStatus(it, "failed", "Send failed", 0); resolve(); }
    });
  }
})();
</script>
</body>
</html>

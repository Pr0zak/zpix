<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="stage"></div>
<div id="clock" class="hidden"></div>
<div id="msg"></div>

<!-- Splash -->
<div id="splash">
  <div class="splash-inner">
    <svg class="splash-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#5b6bff"/>
          <stop offset="0.55" stop-color="#8a4ff0"/>
          <stop offset="1" stop-color="#d24be0"/>
        </linearGradient>
        <clipPath id="scard"><rect x="148" y="172" width="216" height="172" rx="22"/></clipPath>
      </defs>
      <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#sg)"/>
      <g transform="rotate(-13 256 262)">
        <rect x="150" y="150" width="216" height="172" rx="22" fill="#ffffff" opacity="0.5"/>
      </g>
      <g transform="rotate(7 256 286)">
        <rect x="148" y="172" width="216" height="172" rx="22" fill="#ffffff"/>
        <g clip-path="url(#scard)">
          <rect x="148" y="172" width="216" height="172" fill="#eef1ff"/>
          <circle cx="206" cy="222" r="22" fill="#ffb24d"/>
          <path d="M148 344 L206 268 L252 314 L300 254 L364 344 Z" fill="#4a4f86"/>
          <path d="M252 344 L300 290 L364 344 Z" fill="#6a6fb0"/>
        </g>
      </g>
    </svg>
    <div class="splash-word">zpix</div>
    <div class="splash-tag">photo frame</div>
  </div>
</div>

<!-- Settings -->
<div id="settings" class="hidden">
  <div class="sheet">
    <div class="sheet-head">
      <img src="logo.svg" alt="">
      <span>zpix settings</span>
    </div>
    <div class="sheet-body">

      <section>
        <div class="lbl">Photo folders</div>
        <div id="folderList" class="folders"></div>
        <button id="btnAddFolder" class="btn ghost addbtn">+ Add folder</button>
      </section>

      <section>
        <div class="lbl">Seconds per photo: <b id="dwellVal"></b></div>
        <input id="dwell" type="range" min="3" max="40" step="1">
      </section>

      <section>
        <div class="lbl">Photos per collage / float: <b id="multiVal"></b></div>
        <input id="multi" type="range" min="2" max="16" step="1">
      </section>

      <section>
        <div class="lbl">Photo size (floating)</div>
        <div class="pillgroup" id="grpSize">
          <button class="pill" data-val="small">Small</button>
          <button class="pill" data-val="medium">Medium</button>
          <button class="pill" data-val="large">Large</button>
        </div>
      </section>

      <section>
        <div class="lbl">Order</div>
        <div class="pillgroup" id="grpOrder">
          <button class="pill" data-val="random">Random</button>
          <button class="pill" data-val="name">By name</button>
          <button class="pill" data-val="date">By date</button>
        </div>
      </section>

      <section>
        <div class="lbl">Image fit (single photos)</div>
        <div class="pillgroup" id="grpFit">
          <button class="pill" data-val="contain">Fit whole</button>
          <button class="pill" data-val="cover">Fill screen</button>
        </div>
      </section>

      <section>
        <div class="lbl">Transition speed</div>
        <div class="pillgroup" id="grpSpeed">
          <button class="pill" data-val="slow">Slow</button>
          <button class="pill" data-val="normal">Normal</button>
          <button class="pill" data-val="fast">Fast</button>
        </div>
      </section>

      <section>
        <div class="lbl">Overlays</div>
        <label class="row"><input type="checkbox" id="showClock"><span>Show clock</span></label>
        <label class="row"><input type="checkbox" id="showDate"><span>Show date</span></label>
      </section>

      <section>
        <div class="lbl">Transitions</div>
        <div class="tx">
          <label class="row"><input type="checkbox" data-tx="kenburns"><span>Ken Burns (slow pan / zoom)</span></label>
          <label class="row"><input type="checkbox" data-tx="fade"><span>Crossfade</span></label>
          <label class="row"><input type="checkbox" data-tx="slide"><span>Slide</span></label>
          <label class="row"><input type="checkbox" data-tx="mosaic"><span>Scattered collage</span></label>
          <label class="row"><input type="checkbox" data-tx="float"><span>Floating photos</span></label>
          <label class="row"><input type="checkbox" data-tx="origami"><span>Origami fold</span></label>
          <label class="row"><input type="checkbox" data-tx="polaroid"><span>Polaroid stack</span></label>
          <label class="row"><input type="checkbox" data-tx="magazine"><span>Magazine layout</span></label>
          <label class="row"><input type="checkbox" data-tx="filmstrip"><span>Filmstrip scroll</span></label>
          <label class="row"><input type="checkbox" data-tx="blinds"><span>Reveal blinds</span></label>
          <label class="row"><input type="checkbox" data-tx="cube"><span>Cube turn</span></label>
        </div>
      </section>

      <section class="about">
        <div class="lbl">About</div>
        <div class="about-row">zpix <b id="aboutVer"></b></div>
        <div class="about-row" id="aboutCount"></div>
        <div class="about-row" id="aboutRepo"></div>
        <div class="about-row update-row">
          <button id="btnUpdate" class="btn ghost">Check for updates</button>
          <span id="updStatus"></span>
        </div>
      </section>

    </div>
    <div class="sheet-foot">
      <button id="btnClose" class="btn ghost">Close</button>
      <button id="btnSave" class="btn primary">Save &amp; restart</button>
    </div>
  </div>
</div>

<!-- Folder browser -->
<div id="browser" class="hidden">
  <div class="sheet">
    <div class="sheet-head"><span>Add a folder</span></div>
    <div class="browser-bar">
      <span id="browserPath"></span>
      <span id="browserImages" class="cnt"></span>
    </div>
    <div class="sheet-body" id="browserList"></div>
    <div class="sheet-foot">
      <button id="browserUp" class="btn ghost">Up</button>
      <button id="browserCancel" class="btn ghost">Cancel</button>
      <button id="browserAdd" class="btn primary">Add this folder</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

name: Release zpix

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Determine version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in v*) : ;; *) TAG="v0.0.0" ;; esac
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Stamp version into manifest + app.js
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          BASE="${VER%%-*}"
          IFS=. read -r MA MI PA <<< "$BASE"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          CODE=$((MA*10000 + MI*100 + PA))
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"$VER\"/" AndroidManifest.xml
          sed -i "s/android:versionCode=\"[^\"]*\"/android:versionCode=\"$CODE\"/" AndroidManifest.xml
          sed -i "s/var VERSION = \"[^\"]*\"/var VERSION = \"$VER\"/" assets/app.js
          echo "versionName=$VER versionCode=$CODE"

      - name: Decode keystore
        env:
          KSB64: ${{ secrets.ZPIX_KEYSTORE_BASE64 }}
        run: echo "$KSB64" | base64 -d > "$RUNNER_TEMP/zpix.keystore"

      - name: Build APK
        env:
          KS: ${{ runner.temp }}/zpix.keystore
          KS_PASS: ${{ secrets.ZPIX_KEYSTORE_PASSWORD }}
          KEY_ALIAS: zpix
        run: |
          chmod +x build.sh
          ./build.sh
          cp build/zpix.apk "zpix-${{ steps.ver.outputs.tag }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpix-apk
          path: zpix-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: zpix ${{ steps.ver.outputs.tag }}
          files: zpix-*.apk
          generate_release_notes: true
